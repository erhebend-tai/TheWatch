<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TheWatch — Command Center</title>
  <style>
    body { font-family: system-ui; background: #0a0a0a; color: #e0e0e0; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .card { text-align: center; max-width: 500px; padding: 2rem; }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    .status { color: #4caf50; font-weight: bold; }
    .sub { color: #888; font-size: 0.9rem; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>TheWatch</h1>
    <p class="status">Firebase Hosting Active</p>
    <p>Firestore: <span id="fs-status">checking...</span></p>
    <p class="sub">Dashboard API and Blazor SSR are hosted on Azure Container Apps.</p>
    <p class="sub">This Firebase project provides Firestore for swarm inventory persistence.</p>
  </div>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAzPNS2_TSz72DO4yo1UpW3JSVQO_f6kzk",
      authDomain: "gen-lang-client-0590872284.firebaseapp.com",
      projectId: "gen-lang-client-0590872284",
      storageBucket: "gen-lang-client-0590872284.firebasestorage.app",
      messagingSenderId: "125253446377",
      appId: "1:125253446377:web:0ada2fe9601aaaf5ab1e78",
      measurementId: "G-4XBNDBRXCS"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    try {
      const snap = await getDocs(collection(db, "swarm_files"));
      document.getElementById("fs-status").textContent = `connected (${snap.size} files)`;
      document.getElementById("fs-status").style.color = "#4caf50";
    } catch (e) {
      document.getElementById("fs-status").textContent = "not initialized";
      document.getElementById("fs-status").style.color = "#ff9800";
    }
  </script>
</body>
</html>
